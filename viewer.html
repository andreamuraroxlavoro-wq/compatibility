<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Compatibilità Accessori — Security TOWER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0C2340;--blue:#1460B8;--green:#2E7D32;--orange:#D05800;--orange2:#F5A623;
  --lg:#F2F5F9;--mg:#D8E2EE;--dg:#6B7F96;--dark:#12263A
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#E8EDF5;color:var(--dark)}

/* ── TOPBAR ── */
#tb{position:fixed;top:0;left:0;right:0;height:50px;background:var(--navy);
  display:flex;align-items:center;padding:0 20px;gap:12px;z-index:200;box-shadow:0 2px 12px #0005}
#tb .logo{font-weight:900;font-size:15px;color:#fff}
#tb .logo em{color:#4CA0E8;font-style:normal}
#tb .status{margin-left:auto;font-size:11px;color:#60A0E0;display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── LAYOUT ── */
#wrap{display:flex;padding-top:50px;min-height:100vh}
#sb{position:fixed;top:50px;left:0;bottom:0;width:225px;background:var(--navy);overflow-y:auto;z-index:100;padding-bottom:20px}
#main{margin-left:225px;flex:1;padding:22px}

/* ── SIDEBAR ── */
.sbb{padding:11px 14px;background:#071a2e;border-bottom:1px solid #1a3556;
  display:flex;align-items:center;gap:8px;cursor:pointer;transition:.15s;user-select:none}
.sbb:hover,.sbb.on{background:#0d2540}
.sb-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.sb-bname{color:#fff;font-weight:700;font-size:12px;flex:1}
.sb-tree{overflow:hidden;max-height:0;transition:max-height .3s ease}
.sb-tree.open{max-height:2000px}
.sb-sg{padding:8px 14px 8px 26px;cursor:pointer;font-size:11.5px;color:#7090B0;
  display:flex;align-items:center;gap:7px;border-left:2px solid transparent;transition:.15s}
.sb-sg:hover{background:#142a40;color:#fff}
.sb-sg.on{background:#142a40;color:#fff;border-left-color:var(--blue)}
.sb-sg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-sg-tree{overflow:hidden;max-height:0;transition:max-height .25s ease}
.sb-sg-tree.open{max-height:2000px}
.sb-grp{padding:7px 14px 7px 40px;cursor:pointer;font-size:11px;color:#507090;
  display:flex;align-items:center;gap:6px;border-left:2px solid transparent;transition:.15s}
.sb-grp:hover{background:#0d2030;color:#90B8D8}
.sb-grp.on{background:#0d2030;color:#fff;border-left-color:#4CA0E8}
.sb-sec{padding:10px 14px 4px;font-size:9px;font-weight:700;color:#4a6a8a;letter-spacing:1.2px;text-transform:uppercase}
.sb-item{padding:9px 18px;cursor:pointer;font-size:12.5px;color:#90B8D8;
  display:flex;align-items:center;gap:8px;border-left:3px solid transparent;transition:.15s}
.sb-item:hover{background:#142a40;color:#fff}
.sb-item.on{background:#142a40;color:#fff;border-left-color:var(--blue)}

/* ── PAGE HEADER ── */
.ph{display:flex;align-items:flex-start;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.ph-t{font-size:20px;font-weight:800;color:var(--navy)}
.ph-s{font-size:11px;color:var(--dg);margin-top:2px}
.ph-r{margin-left:auto;display:flex;gap:8px;align-items:center}
.ph-col{flex-direction:column;align-items:stretch;gap:10px}
.ph-col .ph-row{display:flex;align-items:center;gap:10px;width:100%;flex-wrap:wrap}
.ph-col .ph-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap;width:100%}

/* ── SEARCH ── */
.srch{position:relative}
.srch input{padding:8px 12px 8px 34px;border:1.5px solid var(--mg);border-radius:20px;
  font-size:12px;width:250px;background:#fff;transition:background .15s,border-color .15s}
.srch input:focus{outline:none;border-color:var(--blue)}
.srch::before{content:"🔍";position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px}

/* ── SUBGROUP OVERVIEW ── */
.sg-overview{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.sg-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 5px #0001;
  cursor:pointer;transition:.2s;border:2px solid transparent;position:relative}
.sg-card:hover{box-shadow:0 4px 16px #0002;border-color:var(--blue);transform:translateY(-2px)}
.sg-card-bar{height:5px}
.sg-card-body{padding:14px}
.sg-card-name{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:5px}
.sg-card-cnt{font-size:11px;color:var(--dg)}

/* ── GROUP CARDS ── */
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:15px}
.gc{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 5px #0001;
  cursor:pointer;transition:.2s;border:2px solid transparent}
.gc:hover{box-shadow:0 5px 20px #0002;border-color:var(--blue);transform:translateY(-2px)}
.gc-bar{height:5px}
.gc-img{height:130px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px}
.gc-img img{max-width:100%;max-height:116px;width:auto;height:auto;object-fit:contain;transition:transform .25s,filter .25s}
.gc:hover .gc-img img{transform:scale(1.15);filter:drop-shadow(0 4px 10px #0003)}
.gc-nophoto{color:var(--dg);font-size:11px;text-align:center}
.gc-body{padding:12px}
.gc-name{font-size:13px;font-weight:700;color:var(--navy);line-height:1.3;margin-bottom:7px}
.gc-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}

/* ── DETAIL BOX ── */
.dbox{background:#fff;border-radius:10px;box-shadow:0 1px 5px #0001;margin-bottom:18px;overflow:hidden}
.dbox-bar{height:7px}
.dbox-in{padding:18px;display:flex;gap:18px}
.d-photo{width:165px;min-width:165px;height:132px;background:#fff;border-radius:8px;
  overflow:hidden;display:flex;align-items:center;justify-content:center;padding:6px}
.d-photo img{max-width:100%;max-height:120px;width:auto;height:auto;object-fit:contain}
.d-info{flex:1}
.d-title{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:8px}
.d-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;color:#fff}
.d-models{font-size:11px;color:var(--dg);line-height:1.8}

/* ── ACCESSORI COMPATIBILI ── */
.asec-t{font-size:12px;font-weight:700;color:var(--navy);margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.asec-t::after{content:"";flex:1;height:1px;background:var(--mg)}
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.ac{background:#fff;border-radius:8px;overflow:hidden;border:2px solid var(--mg);transition:.15s;text-align:center}
.ac.cv{border-color:#2E7D3230;background:#F1FBF3}
.ac.co{border-color:#F5A62330;background:#FFFBF0}
.ac:hover{box-shadow:0 3px 12px #0002;transform:translateY(-1px)}
.ac-bar{height:4px}
.ac-photo{height:72px;display:flex;align-items:center;justify-content:center;background:#fff;overflow:hidden;padding:4px}
.ac-photo img{max-width:100%;max-height:64px;width:auto;height:auto;object-fit:contain}
.ac-body{padding:6px 6px 7px}
.ac-code{font-size:9.5px;font-weight:700;color:var(--orange);margin-bottom:2px}
.ac-name{font-size:8px;color:var(--dg);line-height:1.3}
.ac-badge{font-size:8px;font-weight:700;padding:2px 5px;border-radius:7px;display:inline-block;margin-top:3px}

/* ── ACC PAGE CARDS ── */
.afc{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 5px #0001;transition:.2s;text-align:center}
.afc:hover{box-shadow:0 4px 15px #0002;transform:translateY(-1px)}
.afc-img{height:100px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px}
.afc-img img{max-width:100%;max-height:84px;object-fit:contain}
.afc-body{padding:10px}
.afc-code{font-size:11px;font-weight:700;color:var(--orange);margin-bottom:3px}
.afc-name{font-size:10px;color:var(--dg);margin-bottom:5px;line-height:1.4}
.afc-cat{font-size:9px;color:#fff;padding:2px 6px;border-radius:5px;display:inline-block}
.afg{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:13px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border:none;
  border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.bn{background:var(--navy);color:#fff}
.bs{background:var(--mg);color:var(--navy)}
.bsm{padding:4px 10px;font-size:11px}

/* ── MISC ── */
.models-box{background:var(--lg);border-radius:8px;padding:12px;margin-top:10px}
.models-box h4{font-size:11px;font-weight:700;color:var(--navy);margin-bottom:8px}
.models-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:4px}
.mpill{background:#fff;border-radius:5px;padding:5px 9px;font-size:10.5px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:5px}
.mpill .d{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.loading{text-align:center;padding:80px 20px;color:var(--dg)}
.loading .spin{font-size:40px;animation:spin 1s linear infinite;display:inline-block;margin-bottom:12px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--dg)}
</style>
</head>
<body>

<div id="tb">
  <div class="logo">S<em>&</em>CURITY &nbsp;<span style="font-weight:400;opacity:.5;font-size:11px">Compatibilità Accessori</span></div>
  <div class="status"><div class="dot" id="conn-dot"></div><span id="conn-txt">Caricamento...</span></div>
</div>

<div id="wrap">
  <div id="sb">
    <div id="sb-tree"></div>
    <div class="sb-sec">Visualizza</div>
    <div class="sb-item on" id="nav-acc">🔩 Accessori Generali</div>
  </div>
  <div id="main">
    <div class="loading"><div class="spin">⚙️</div><p style="font-size:15px;font-weight:600">Caricamento dati...</p></div>
  </div>
</div>

<script>
// ═══ CONFIG ════════════════════════════════════════════════════════
var SCRIPT_URL='https://script.google.com/macros/s/AKfycbzR57fGGOywinbO46hQm4w-6y2DHoeSn528vElpASYOu_ABb62sX5ZP9RLFndzEZniD/exec';

// ═══ STATE ═════════════════════════════════════════════════════════
var S={
  brands:[],subgroups:[],groups:[],accessories:[],brand_accessories:[],
  cur:{brand:null,sg:null,group:null,section:'home'}
};

// ═══ FNV-1a COLOR (stesso dell'admin) ════════════════════════════
var _catColorCache={};
function catColor(cat){
  if(_catColorCache[cat])return _catColorCache[cat];
  var h=0x811c9dc5;
  for(var i=0;i<cat.length;i++){h^=cat.charCodeAt(i);h=(h*0x01000193)>>>0;}
  var hue=h%360;
  if(hue>=50&&hue<=80)hue=(hue+120)%360;
  var bg='hsl('+hue+',28%,96%)';
  var border='hsl('+hue+',28%,80%)';
  var title='hsl('+hue+',30%,38%)';
  _catColorCache[cat]={bg:bg,border:border,title:title};
  return _catColorCache[cat];
}

// ═══ LOAD DATA ═════════════════════════════════════════════════════
function loadData(){
  setConn(null,'Connessione in corso...');
  fetch(SCRIPT_URL+'?action=load')
    .then(function(r){return r.json();})
    .then(function(res){
      if(res.ok){
        S.brands=res.data.brands||[];
        S.subgroups=res.data.subgroups||[];
        S.groups=res.data.groups||[];
        S.accessories=res.data.accessories||[];
        S.brand_accessories=res.data.brand_accessories||[];
        if(!S.cur.brand&&S.brands.length)S.cur.brand=S.brands[0].id;
        setConn(true,'☁️ Dati aggiornati');
        render();
      }else{
        showError('⚠️ '+(res.error||'Errore server'));
      }
    })
    .catch(function(){
      showError('📴 Nessuna connessione disponibile');
    });
}

function showError(msg){
  setConn(false,msg);
  document.getElementById('main').innerHTML=
    '<div style="text-align:center;padding:80px 20px">'+
    '<div style="font-size:48px;margin-bottom:16px">📡</div>'+
    '<div style="font-size:16px;font-weight:700;color:#0C2340;margin-bottom:8px">Impossibile caricare i dati</div>'+
    '<div style="font-size:13px;color:#6B7F96;margin-bottom:20px">'+msg+'</div>'+
    '<div style="font-size:12px;color:#6B7F96;background:#F2F5F9;border-radius:8px;padding:12px;max-width:400px;margin:0 auto;text-align:left">'+
    '• Verifica la connessione internet<br>'+
    '• Chiedi all&#39;amministratore di pubblicare i dati su Google Sheets'+
    '</div>'+
    '<button onclick="loadData()" style="margin-top:20px;padding:10px 24px;background:#1460B8;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">🔄 Riprova</button>'+
    '</div>';
}

function setConn(ok,msg){
  var dot=document.getElementById('conn-dot');
  var txt=document.getElementById('conn-txt');
  if(ok===null){dot.style.background='#F5A623';dot.style.animation='pulse 0.5s infinite';}
  else if(ok){dot.style.background='#4CAF50';dot.style.animation='pulse 2s infinite';}
  else{dot.style.background='#F44336';dot.style.animation='none';}
  txt.textContent=msg||(ok?'OK':'Errore');
}

// ═══ RENDER ════════════════════════════════════════════════════════
function render(){
  renderSidebar();
  var m=document.getElementById('main');
  if(S.cur.section==='home'){
    if(S.cur.group) renderDetail(m);
    else if(S.cur.sg) renderSgDetail(m);
    else renderBrandHome(m);
  } else {
    renderAcc(m);
  }
}

// ═══ SIDEBAR ═══════════════════════════════════════════════════════
function renderSidebar(){
  var el=document.getElementById('sb-tree');
  el.innerHTML='';
  S.brands.forEach(function(b){
    var active=(b.id===S.cur.brand);
    var sgs=S.subgroups.filter(function(x){return x.brand===b.id;});
    var treeId='tree_'+b.id.replace(/\W/g,'_');

    var bh=document.createElement('div');bh.className='sbb';
    bh.innerHTML=
      '<div class="sb-dot" style="background:'+b.color+';'+(!active?'opacity:.4':'')+'"></div>'+
      '<div class="sb-bname" style="'+(!active?'opacity:.55':'')+'">'+b.name+'</div>'+
      '<span style="color:#4CA0E8;font-size:14px;font-weight:700;margin-left:auto">'+
        (active?'\u2212':'+')+'</span>';
    bh.querySelector('.sb-bname').onclick=function(){
      S.cur.brand=b.id;S.cur.sg=null;S.cur.group=null;S.cur.section='home';render();
    };
    bh.querySelector('span').onclick=function(e){
      e.stopPropagation();
      var t=document.getElementById(treeId);
      if(t){
        var op=t.classList.toggle('open');
        bh.querySelector('span').textContent=op?'\u2212':'+';
      }
    };
    el.appendChild(bh);

    var tree=document.createElement('div');
    tree.id=treeId;tree.className='sb-tree'+(active?' open':'');

    sgs.forEach(function(sg){
      var sgActive=(S.cur.sg===sg.id&&active);
      var grps=S.groups.filter(function(g){return g.subgroup===sg.id;});
      var sgTreeId='sgtree_'+sg.id.replace(/\W/g,'_');

      var sgh=document.createElement('div');
      sgh.className='sb-sg'+(sgActive?' on':'');
      sgh.innerHTML=
        '<div class="sb-sg-dot" style="background:'+(sg.color||b.color)+'"></div>'+
        '<span style="flex:1">'+(sg.is_acc_group?'🔩 ':'')+ sg.name +'</span>'+
        '<span class="sg-tog" style="color:#4CA0E8;font-size:11px;cursor:pointer;padding:0 4px">'+(sgActive?'\u2212':'+')+'</span>';
      sgh.onclick=function(){
        S.cur.brand=b.id;S.cur.sg=sg.id;S.cur.group=null;S.cur.section='home';render();
      };
      sgh.querySelector('.sg-tog').onclick=function(e){
        e.stopPropagation();
        var st=document.getElementById(sgTreeId);
        if(st){var op=st.classList.toggle('open');this.textContent=op?'\u2212':'+ ';}
      };
      tree.appendChild(sgh);

      var sgTree=document.createElement('div');
      sgTree.id=sgTreeId;sgTree.className='sb-sg-tree'+(sgActive?' open':'');
      grps.forEach(function(g){
        var gl=document.createElement('div');
        gl.className='sb-grp'+(S.cur.group===g.id?' on':'');
        gl.textContent=g.name.length>28?g.name.substring(0,26)+'\u2026':g.name;
        gl.onclick=function(){
          S.cur.brand=b.id;S.cur.sg=sg.id;S.cur.group=g.id;S.cur.section='home';render();
        };
        sgTree.appendChild(gl);
      });
      tree.appendChild(sgTree);
    });
    el.appendChild(tree);
  });

  document.getElementById('nav-acc').className='sb-item'+(S.cur.section==='acc'?' on':'');
}

// ═══ BRAND HOME ════════════════════════════════════════════════════
function renderBrandHome(m){
  var b=S.brands.find(function(x){return x.id===S.cur.brand;});
  var sgs=S.subgroups.filter(function(x){return x.brand===S.cur.brand;});
  m.innerHTML=
    '<div class="ph"><div><div class="ph-t">'+(b?b.name:'')+'</div>'+
    '<div class="ph-s">'+sgs.length+' sottogruppi</div></div></div>'+
    '<div class="sg-overview" id="sg-grid"></div>';
  var grid=document.getElementById('sg-grid');
  if(!sgs.length){grid.innerHTML='<div class="empty">📁<br>Nessun sottogruppo</div>';return;}
  sgs.forEach(function(sg){
    var c=sg.color||(b?b.color:'#1460B8');
    var grps=S.groups.filter(function(g){return g.subgroup===sg.id;});
    var card=document.createElement('div');card.className='sg-card';
    var cntHtml;
    if(sg.is_acc_group){
      var nAcc=(S.brand_accessories||[]).filter(function(a){return a.brand===sg.brand;}).length;
      cntHtml='<div class="sg-card-cnt" style="color:var(--blue);font-weight:700">'+nAcc+' accessor'+(nAcc===1?'io':'i')+'</div>';
    }else{
      cntHtml='<div class="sg-card-cnt">'+grps.length+' gruppi · '+grps.reduce(function(s,g){return s+(g.models||[]).length;},0)+' modelli</div>';
    }
    card.innerHTML=
      '<div class="sg-card-bar" style="background:'+c+'"></div>'+
      '<div class="sg-card-body"><div class="sg-card-name">'+sg.name+'</div>'+cntHtml+
      (sg.desc?'<div style="font-size:10px;color:var(--dg);margin-top:4px">'+sg.desc+'</div>':'')+'</div>';
    card.onclick=function(){S.cur.sg=sg.id;render();};
    grid.appendChild(card);
  });
}

// ═══ SG DETAIL ═════════════════════════════════════════════════════
function renderSgDetail(m){
  var sg=S.subgroups.find(function(x){return x.id===S.cur.sg;});
  if(!sg){S.cur.sg=null;renderBrandHome(m);return;}
  var b=S.brands.find(function(x){return x.id===sg.brand;})||{color:'#1460B8'};
  var c=sg.color||b.color;

  // Se è il gruppo accessori, mostra gli accessori del marchio
  if(sg.is_acc_group){
    renderBrandAcc(m,sg);return;
  }

  var grps=S.groups.filter(function(g){return g.subgroup===sg.id;});
  var q=(window._sgq||'').toLowerCase();
  var fl=grps.filter(function(g){return !q||g.name.toLowerCase().includes(q)||(g.models||[]).some(function(mm){return mm.toLowerCase().includes(q);});});

  m.innerHTML=
    '<div class="ph ph-col">'+
    '<div class="ph-row"><button class="btn bn bsm" id="sg-back">← Torna</button>'+
    '<div><div class="ph-t">'+sg.name+'</div>'+
    '<div class="ph-s">'+grps.length+' gruppi</div></div></div>'+
    '<div class="ph-btns"><div class="srch" style="margin-left:0"><input id="sg-srch" placeholder="Cerca..." value="'+(window._sgq||'')+'"></div></div>'+
    '</div><div class="gg" id="grp-grid"></div>';

  document.getElementById('sg-back').onclick=function(){S.cur.sg=null;S.cur.group=null;render();};
  document.getElementById('sg-srch').oninput=function(){
    window._sgq=this.value;
    this.style.background=this.value?'#FFFF00':'';
    this.style.fontWeight=this.value?'700':'';
    renderSgDetail(m);
  };

  var grid=document.getElementById('grp-grid');
  if(!fl.length){grid.innerHTML='<div class="empty">📦<br>Nessun gruppo</div>';return;}
  fl.forEach(function(g){
    var gc=g.color||c;
    var nv=(g.compatible||[]).length,no=(g.optional||[]).length;
    var card=document.createElement('div');card.className='gc';
    card.innerHTML=
      '<div class="gc-bar" style="background:'+gc+'"></div>'+
      '<div class="gc-img">'+(g.photo?'<img src="'+g.photo+'">':'<div class="gc-nophoto">📷<br>Nessuna foto</div>')+'</div>'+
      '<div class="gc-body"><div class="gc-name">'+g.name+'</div>'+
      '<div class="gc-tags">'+
      '<span class="tag" style="background:#E8F5E9;color:#2E7D32">'+(g.models||[]).length+' modelli</span>'+
      '<span class="tag" style="background:#EBF3FF;color:#1460B8">'+nv+' acc.</span>'+
      (no?'<span class="tag" style="background:#FFF8E1;color:#E65100">'+no+' opz.</span>':'')+ 
      '</div></div>';
    card.onclick=function(){S.cur.group=g.id;render();};
    grid.appendChild(card);
  });
}

// ═══ DETAIL GRUPPO ═════════════════════════════════════════════════
function renderDetail(m){
  var g=S.groups.find(function(x){return x.id===S.cur.group;});
  if(!g){S.cur.group=null;renderSgDetail(m);return;}
  var sg=S.subgroups.find(function(x){return x.id===g.subgroup;})||{color:'#1460B8'};
  var c=g.color||sg.color||'#1460B8';
  var allAccs=S.accessories.concat(S.brand_accessories||[]);
  var acv=(g.compatible||[]).map(function(id){return allAccs.find(function(a){return a.id===id;});}).filter(Boolean);
  var aco=(g.optional||[]).filter(function(id){return!(g.compatible||[]).includes(id);}).map(function(id){return allAccs.find(function(a){return a.id===id;});}).filter(Boolean);

  var html=
    '<div class="ph ph-col">'+
    '<div class="ph-row"><button class="btn bn bsm" id="vbk">← Torna</button>'+
    '<div><div class="ph-t">'+g.name+'</div>'+
    '<div class="ph-s">'+(g.models||[]).length+' modelli · '+acv.length+' compatibili'+(aco.length?' · '+aco.length+' opz.':'')+' </div></div></div></div>'+
    '<div class="dbox"><div class="dbox-bar" style="background:'+c+'"></div>'+
    '<div class="dbox-in">'+
    '<div class="d-photo">'+(g.photo?'<img src="'+g.photo+'">':'<span style="color:var(--dg);font-size:22px">📷</span>')+'</div>'+
    '<div class="d-info"><div class="d-title">'+g.name+'</div>'+
    '<div class="d-pills">'+
    '<span class="pill" style="background:'+c+'">'+(g.models||[]).length+' Modelli</span>'+
    '<span class="pill" style="background:var(--green)">'+acv.length+' Compatibili</span>'+
    (aco.length?'<span class="pill" style="background:var(--orange)">'+aco.length+' Opzionali</span>':'')+
    '</div>'+
    '<div class="models-box"><h4>Modelli</h4><div class="models-grid">'+
    (g.models||[]).map(function(mm){return'<div class="mpill"><div class="d" style="background:'+c+'"></div>'+mm+'</div>';}).join('')+
    '</div></div></div></div></div>';

  if(acv.length) html+='<div class="asec-t">✅ Compatibili ('+acv.length+')</div><div class="ag">'+acv.map(function(a){return accCard(a,'v',c);}).join('')+'</div>';
  if(aco.length) html+='<div class="asec-t">⚪ Opzionali ('+aco.length+')</div><div class="ag">'+aco.map(function(a){return accCard(a,'o',c);}).join('')+'</div>';
  if(!acv.length&&!aco.length) html+='<div style="background:#F0FBF0;border-radius:10px;padding:40px;text-align:center;margin-top:10px"><div style="font-size:38px;margin-bottom:8px">✅</div><div style="font-size:15px;font-weight:700;color:var(--green)">Staffa integrata</div><div style="font-size:12px;color:var(--dg);margin-top:4px">Nessun accessorio esterno necessario</div></div>';

  m.innerHTML=html;
  document.getElementById('vbk').onclick=function(){S.cur.group=null;render();};
}

function accCard(a,t,c){
  var stripe=t==='v'?c:'#F5A623';
  var badge=t==='v'?'<span class="ac-badge" style="background:#E8F5E9;color:#2E7D32">✓ Compat.</span>':'<span class="ac-badge" style="background:#FFF8E1;color:#E65100">⚪ Opz.</span>';
  return '<div class="ac '+(t==='v'?'cv':'co')+'">'+
    '<div class="ac-bar" style="background:'+stripe+'"></div>'+
    '<div class="ac-photo">'+(a.photo?'<img src="'+a.photo+'">':"<span style='font-size:20px'>🔩</span>")+'</div>'+
    '<div class="ac-body"><div class="ac-code">'+a.code+'</div><div class="ac-name">'+a.name+'</div>'+badge+'</div></div>';
}

// ═══ ACCESSORI MARCHIO ═════════════════════════════════════════════
function renderBrandAcc(m,sg){
  var b=S.brands.find(function(x){return x.id===S.cur.brand;});
  var brandName=b?b.name:'Marchio';
  var allBrandAcc=(S.brand_accessories||[]).filter(function(a){return a.brand===S.cur.brand;});
  var q=(window._baq||'').toLowerCase();
  var fl=allBrandAcc.filter(function(a){return !q||a.code.toLowerCase().includes(q)||a.name.toLowerCase().includes(q)||(a.category||'').toLowerCase().includes(q);});
  var cats=[...new Set(allBrandAcc.map(function(a){return a.category||'Altro';}))].sort();

  m.innerHTML=
    '<div class="ph ph-col">'+
    '<div class="ph-row"><button class="btn bn bsm" id="bacc-back">← Torna</button>'+
    '<div><div class="ph-t">Accessori — '+brandName+'</div>'+
    '<div class="ph-s">'+allBrandAcc.length+' accessori</div></div></div>'+
    '<div class="ph-btns"><div class="srch" style="margin-left:0"><input id="bacc-srch" placeholder="Cerca..." value="'+(window._baq||'')+'"></div></div>'+
    '</div><div id="bacc-cats"></div>';

  document.getElementById('bacc-back').onclick=function(){S.cur.sg=null;render();};
  document.getElementById('bacc-srch').oninput=function(){
    window._baq=this.value;
    this.style.background=this.value?'#FFFF00':'';
    this.style.fontWeight=this.value?'700':'';
    renderBrandAcc(m,sg);
  };

  var ac=document.getElementById('bacc-cats');
  cats.forEach(function(cat){
    var items=fl.filter(function(a){return(a.category||'Altro')===cat;});
    if(!items.length)return;
    var cc=catColor(cat);
    var sec=document.createElement('div');
    sec.style.cssText='background:'+cc.bg+';border-radius:10px;padding:12px 14px 14px;margin-bottom:16px;border-left:4px solid '+cc.border;
    sec.innerHTML='<div class="asec-t" style="color:'+cc.title+';margin-top:0">'+cat+' ('+items.length+')</div><div class="afg"></div>';
    var grid=sec.querySelector('.afg');
    items.forEach(function(a){
      var card=document.createElement('div');card.className='afc';
      card.style.cssText='border-top:3px solid '+cc.border;
      card.innerHTML=
        '<div class="afc-img">'+(a.photo?'<img src="'+a.photo+'">':"<span style='font-size:28px;color:var(--dg)'>🔩</span>")+'</div>'+
        '<div class="afc-body"><div class="afc-code">'+a.code+'</div>'+
        '<div class="afc-name">'+a.name+'</div>'+
        (a.notes?'<div style="font-size:9px;color:var(--dg);margin-top:3px;font-style:italic">'+a.notes+'</div>':'')+
        '<span class="afc-cat" style="background:'+cc.border+';color:#fff">'+(a.category||'Altro')+'</span></div>';
      grid.appendChild(card);
    });
    ac.appendChild(sec);
  });
  if(!fl.length) ac.innerHTML='<div class="empty">🔩<br>Nessun accessorio</div>';
}

// ═══ ACCESSORI GENERALI ════════════════════════════════════════════
function renderAcc(m){
  var q=(window._vaq||'').toLowerCase();
  var cats=[...new Set(S.accessories.map(function(a){return a.category||'Altro';}))].sort();
  var fl=S.accessories.filter(function(a){return !q||a.code.toLowerCase().includes(q)||a.name.toLowerCase().includes(q)||(a.category||'').toLowerCase().includes(q);});

  m.innerHTML=
    '<div class="ph ph-col">'+
    '<div><div class="ph-t">Accessori Generali</div>'+
    '<div class="ph-s">'+S.accessories.length+' accessori</div></div>'+
    '<div class="ph-btns"><div class="srch" style="margin-left:0"><input id="va-srch" placeholder="Cerca accessorio..." value="'+(window._vaq||'')+'"></div></div>'+
    '</div><div id="vacc-cats"></div>';

  document.getElementById('va-srch').oninput=function(){
    window._vaq=this.value;
    this.style.background=this.value?'#FFFF00':'';
    this.style.fontWeight=this.value?'700':'';
    renderAcc(m);
  };

  var el=document.getElementById('vacc-cats');
  cats.forEach(function(cat){
    var items=fl.filter(function(a){return(a.category||'Altro')===cat;});
    if(!items.length)return;
    var cc=catColor(cat);
    var sec=document.createElement('div');
    sec.style.cssText='background:'+cc.bg+';border-radius:10px;padding:12px 14px 14px;margin-bottom:16px;border-left:4px solid '+cc.border;
    sec.innerHTML='<div class="asec-t" style="color:'+cc.title+';margin-top:0">'+cat+' ('+items.length+')</div><div class="afg"></div>';
    var grid=sec.querySelector('.afg');
    items.forEach(function(a){
      var card=document.createElement('div');card.className='afc';
      card.style.cssText='border-top:3px solid '+cc.border;
      card.innerHTML=
        '<div class="afc-img">'+(a.photo?'<img src="'+a.photo+'">':"<span style='font-size:28px;color:var(--dg)'>🔩</span>")+'</div>'+
        '<div class="afc-body"><div class="afc-code">'+a.code+'</div>'+
        '<div class="afc-name">'+a.name+'</div>'+
        (a.notes?'<div style="font-size:9px;color:var(--dg);margin-top:3px;font-style:italic">'+a.notes+'</div>':'')+
        '<span class="afc-cat" style="background:'+cc.border+';color:#fff">'+(a.category||'Altro')+'</span></div>';
      grid.appendChild(card);
    });
    el.appendChild(sec);
  });
  if(!fl.length) el.innerHTML='<div class="empty">🔩<br>Nessun accessorio</div>';
}

// ═══ START ══════════════════════════════════════════════════════════
document.getElementById('nav-acc').onclick=function(){S.cur.section='acc';S.cur.group=null;render();};
loadData();
</script>
