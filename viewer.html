<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Compatibilità Accessori UNV — Security TOWER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0C2340;--blue:#1460B8;--green:#2E7D32;--orange:#D05800;
  --lg:#F2F5F9;--mg:#D8E2EE;--dg:#6B7F96;--dark:#12263A}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#E8EDF5;color:var(--dark)}
#tb{position:fixed;top:0;left:0;right:0;height:50px;background:var(--navy);
  display:flex;align-items:center;padding:0 20px;gap:12px;z-index:200;box-shadow:0 2px 12px #0005}
#tb .logo{font-weight:900;font-size:15px;color:#fff}
#tb .logo em{color:#4CA0E8;font-style:normal}
#tb .status{margin-left:auto;font-size:11px;color:#60A0E0;display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#wrap{display:flex;padding-top:50px;min-height:100vh}
#sb{position:fixed;top:50px;left:0;bottom:0;width:225px;background:var(--navy);overflow-y:auto;z-index:100}
#main{margin-left:225px;flex:1;padding:22px}
.sbb{padding:11px 14px;background:#071a2e;border-bottom:1px solid #1a3556;
  display:flex;align-items:center;gap:8px;cursor:pointer;transition:.15s}
.sbb:hover,.sbb.on{background:#0d2540}
.sb-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.sb-bname{color:#fff;font-weight:700;font-size:12px}
.sb-sec{padding:12px 14px 4px;font-size:9px;font-weight:700;color:#4a6a8a;letter-spacing:1.2px;text-transform:uppercase}
.sb-item{padding:9px 18px;cursor:pointer;font-size:12.5px;color:#90B8D8;
  display:flex;align-items:center;gap:8px;border-left:3px solid transparent;transition:.15s}
.sb-item:hover{background:#142a40;color:#fff}
.sb-item.on{background:#142a40;color:#fff;border-left-color:var(--blue)}
.ph{display:flex;align-items:flex-start;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.ph-t{font-size:20px;font-weight:800;color:var(--navy)}
.ph-s{font-size:11px;color:var(--dg);margin-top:2px}
.ph-r{margin-left:auto;display:flex;gap:8px;align-items:center}
.srch{position:relative}
.srch input{padding:8px 12px 8px 34px;border:1.5px solid var(--mg);border-radius:20px;
  font-size:12px;width:250px;background:#fff;transition:.2s}
.srch input:focus{outline:none;border-color:var(--blue)}
.srch::before{content:"🔍";position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px}
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:15px}
.gc{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 5px #0001;
  cursor:pointer;transition:.2s;border:2px solid transparent}
.gc:hover{box-shadow:0 5px 20px #0002;border-color:var(--blue);transform:translateY(-2px)}
.gc-bar{height:5px}
.gc-img{height:130px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px}
.gc-img img{max-width:100%;max-height:116px;width:auto;height:auto;object-fit:contain;
  transition:transform .25s ease,filter .25s ease}
.gc:hover .gc-img img{transform:scale(1.15);filter:drop-shadow(0 4px 10px #0003)}
.gc-nophoto{color:var(--dg);font-size:11px;text-align:center}
.gc-body{padding:12px}
.gc-name{font-size:13px;font-weight:700;color:var(--navy);line-height:1.3;margin-bottom:7px}
.gc-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.dbox{background:#fff;border-radius:10px;box-shadow:0 1px 5px #0001;margin-bottom:18px;overflow:hidden}
.dbox-bar{height:7px}
.dbox-in{padding:18px;display:flex;gap:18px}
.d-photo{width:165px;min-width:165px;height:132px;background:#fff;border-radius:8px;
  overflow:hidden;display:flex;align-items:center;justify-content:center;padding:6px}
.d-photo img{max-width:100%;max-height:120px;width:auto;height:auto;object-fit:contain}
.d-info{flex:1}
.d-title{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:8px}
.d-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;color:#fff}
.d-models{font-size:11px;color:var(--dg);line-height:1.8}
.asec-t{font-size:12px;font-weight:700;color:var(--navy);margin:18px 0 10px;
  display:flex;align-items:center;gap:8px}
.asec-t::after{content:"";flex:1;height:1px;background:var(--mg)}
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.ac{background:#fff;border-radius:8px;overflow:hidden;border:2px solid var(--mg);transition:.15s;text-align:center}
.ac.cv{border-color:#2E7D3230;background:#F1FBF3}.ac.co{border-color:#F5A62330;background:#FFFBF0}
.ac:hover{box-shadow:0 3px 12px #0002;transform:translateY(-1px)}
.ac-bar{height:4px}
.ac-photo{height:72px;display:flex;align-items:center;justify-content:center;background:#fff;overflow:hidden;padding:4px}
.ac-photo img{max-width:100%;max-height:64px;width:auto;height:auto;object-fit:contain}
.ac-body{padding:6px 6px 7px}
.ac-code{font-size:9.5px;font-weight:700;color:var(--orange);margin-bottom:2px}
.ac-name{font-size:8px;color:var(--dg);line-height:1.3}
.ac-badge{font-size:8px;font-weight:700;padding:2px 5px;border-radius:7px;display:inline-block;margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border:none;
  border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.bn{background:var(--navy);color:#fff}
.bs{background:var(--mg);color:var(--navy)}
.bsm{padding:4px 10px;font-size:11px}
.loading{text-align:center;padding:80px 20px;color:var(--dg)}
.loading .spin{font-size:40px;animation:spin 1s linear infinite;display:inline-block;margin-bottom:12px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.srch-box{background:#fff;border-radius:10px;padding:16px 20px;margin-bottom:20px;
  box-shadow:0 1px 5px #0001;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.srch-box input{flex:1;min-width:200px;padding:10px 16px;border:1.5px solid var(--mg);
  border-radius:8px;font-size:13px}
.srch-box input:focus{outline:none;border-color:var(--blue)}
.empty{text-align:center;padding:60px 20px;color:var(--dg)}
.models-box{background:var(--lg);border-radius:8px;padding:12px;margin-top:10px}
.models-box h4{font-size:11px;font-weight:700;color:var(--navy);margin-bottom:8px}
.models-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:4px}
.mpill{background:#fff;border-radius:5px;padding:5px 9px;font-size:10.5px;font-weight:600;
  color:var(--navy);display:flex;align-items:center;gap:5px}
.mpill .d{width:6px;height:6px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<div id="tb">
  <div class="logo">S<em>&</em>CURITY &nbsp;<span style="font-weight:400;opacity:.5;font-size:11px">Compatibilità Accessori</span></div>
  <div class="status"><div class="dot" id="conn-dot"></div><span id="conn-txt">Connessione...</span></div>
</div>
<div id="wrap">
  <div id="sb">
    <div id="sb-brands"></div>
    <div class="sb-sec">Visualizza</div>
    <div class="sb-item on" id="nav-home">🏠 Tutti i Gruppi</div>
    <div class="sb-item" id="nav-acc">🔩 Accessori</div>
  </div>
  <div id="main"><div class="loading"><div class="spin">⚙️</div><p style="font-size:15px;font-weight:600">Caricamento dati...</p><p style="font-size:12px;margin-top:6px">Connessione a Google Sheets</p></div></div>
</div>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────
// Sostituisci con l'URL del tuo Apps Script pubblicato
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzR57fGGOywinbO46hQm4w-6y2DHoeSn528vElpASYOu_ABb62sX5ZP9RLFndzEZniD/exec';

var S = {brands:[], groups:[], accessories:[], cur:{brand:null, section:'home', group:null}};

// ── CARICA DATI DA GOOGLE SHEETS ──────────────────────────────────────
function loadData() {
  fetch(SCRIPT_URL + '?action=load')
    .then(function(r){ return r.json(); })
    .then(function(res) {
      if(res.ok) {
        S.brands      = res.data.brands      || [];
        S.groups      = res.data.groups      || [];
        S.accessories = res.data.accessories || [];
        if(!S.cur.brand && S.brands.length) S.cur.brand = S.brands[0].id;
        setConn(true);
        render();
      } else {
        setConn(false, res.error);
      }
    })
    .catch(function(e){ setConn(false, 'Errore di rete'); });
}

function setConn(ok, msg) {
  var dot = document.getElementById('conn-dot');
  var txt = document.getElementById('conn-txt');
  dot.style.background = ok ? '#4CAF50' : '#F44336';
  txt.textContent = ok ? 'Dati aggiornati' : (msg || 'Errore connessione');
}

// ── RENDER ────────────────────────────────────────────────────────────
function render() {
  renderSidebar();
  var m = document.getElementById('main');
  if(S.cur.section === 'home') {
    if(S.cur.group) renderDetail(m);
    else renderHome(m);
  } else {
    renderAcc(m);
  }
}

function renderSidebar() {
  var el = document.getElementById('sb-brands');
  el.innerHTML = '';
  S.brands.forEach(function(b) {
    var d = document.createElement('div'); d.className='sbb'+(b.id===S.cur.brand?' on':'');
    d.innerHTML='<div class="sb-dot" style="background:'+b.color+';'+(b.id===S.cur.brand?'':'opacity:.4')+'"></div>'+
      '<div class="sb-bname" style="'+(b.id===S.cur.brand?'':'opacity:.55')+'">'+b.name+'</div>';
    d.onclick=function(){S.cur.brand=b.id;S.cur.group=null;S.cur.section='home';render();};
    el.appendChild(d);
  });
  document.getElementById('nav-home').className='sb-item'+(S.cur.section==='home'?' on':'');
  document.getElementById('nav-acc').className='sb-item'+(S.cur.section==='acc'?' on':'');
  document.getElementById('nav-home').onclick=function(){S.cur.section='home';S.cur.group=null;render();};
  document.getElementById('nav-acc').onclick=function(){S.cur.section='acc';S.cur.group=null;render();};
}

// ── HOME ──────────────────────────────────────────────────────────────
function renderHome(m) {
  var brand  = S.brands.find(function(b){return b.id===S.cur.brand;});
  var groups = S.groups.filter(function(g){return g.brand===S.cur.brand;});
  var q      = (window._vhq||'').toLowerCase();
  var fl     = groups.filter(function(g){
    return !q || g.name.toLowerCase().includes(q) ||
      (g.models||[]).some(function(mm){return mm.toLowerCase().includes(q);});
  });

  m.innerHTML = '<div class="ph">'+
    '<div><div class="ph-t">'+(brand?brand.name:'Gruppi')+'</div>'+
    '<div class="ph-s">'+groups.length+' gruppi · '+groups.reduce(function(s,g){return s+(g.models||[]).length;},0)+' modelli</div></div>'+
    '<div class="ph-r"><div class="srch"><input id="v-srch" placeholder="Cerca gruppo o modello..." value="'+(window._vhq||'')+'"></div></div>'+
    '</div><div class="gg" id="vgg"></div>';

  document.getElementById('v-srch').oninput=function(){window._vhq=this.value;renderHome(m);};

  var gg = document.getElementById('vgg');
  if(!fl.length){gg.innerHTML='<div class="empty"><div style="font-size:40px;opacity:.3">📦</div><p style="font-size:15px;font-weight:700;margin:8px 0">Nessun risultato</p></div>';return;}
  fl.forEach(function(g){
    var c=g.color||'#1460B8';
    var nv=(g.compatible||[]).length, no=(g.optional||[]).length;
    var card=document.createElement('div'); card.className='gc';
    card.innerHTML='<div class="gc-bar" style="background:'+c+'"></div>'+
      '<div class="gc-img">'+(g.photo?'<img src="'+g.photo+'">':'<div class="gc-nophoto">📷<br>Nessuna foto</div>')+'</div>'+
      '<div class="gc-body"><div class="gc-name">'+g.name+'</div>'+
      '<div class="gc-tags">'+
      '<span class="tag" style="background:#E8F5E9;color:#2E7D32">'+(g.models||[]).length+' modelli</span>'+
      '<span class="tag" style="background:#EBF3FF;color:#1460B8">'+nv+' acc.</span>'+
      (no?'<span class="tag" style="background:#FFF8E1;color:#E65100">'+no+' opz.</span>':'')+
      '</div></div>';
    card.onclick=function(){S.cur.group=g.id;render();};
    gg.appendChild(card);
  });
}

// ── DETAIL ────────────────────────────────────────────────────────────
function renderDetail(m) {
  var g=S.groups.find(function(x){return x.id===S.cur.group;});
  if(!g){S.cur.group=null;renderHome(m);return;}
  var c=g.color||'#1460B8';
  var acv=(g.compatible||[]).map(function(id){return S.accessories.find(function(a){return a.id===id;});}).filter(Boolean);
  var aco=(g.optional||[]).filter(function(id){return!(g.compatible||[]).includes(id);}).map(function(id){return S.accessories.find(function(a){return a.id===id;});}).filter(Boolean);

  var html='<div class="ph">'+
    '<button class="btn bn bsm" id="vbk">← Torna</button>'+
    '<div><div class="ph-t">'+g.name+'</div>'+
    '<div class="ph-s">'+(g.models||[]).length+' modelli · '+acv.length+' compatibili'+(aco.length?' · '+aco.length+' opz.':'')+' </div></div></div>'+
    '<div class="dbox"><div class="dbox-bar" style="background:'+c+'"></div>'+
    '<div class="dbox-in">'+
    '<div class="d-photo">'+(g.photo?'<img src="'+g.photo+'">':'<span style="color:var(--dg);font-size:22px">📷</span>')+'</div>'+
    '<div class="d-info"><div class="d-title">'+g.name+'</div>'+
    '<div class="d-pills">'+
    '<span class="pill" style="background:'+c+'">'+(g.models||[]).length+' Modelli</span>'+
    '<span class="pill" style="background:var(--green)">'+acv.length+' Compatibili</span>'+
    (aco.length?'<span class="pill" style="background:var(--orange)">'+aco.length+' Opzionali</span>':'')+
    '</div>'+
    '<div class="models-box"><h4>Modelli UV-</h4><div class="models-grid">'+
    (g.models||[]).map(function(mm){return'<div class="mpill"><div class="d" style="background:'+c+'"></div>'+mm+'</div>';}).join('')+
    '</div></div></div></div></div>';

  if(acv.length) html+='<div class="asec-t">✅ Compatibili ('+acv.length+')</div><div class="ag">'+acv.map(function(a){return accCard(a,'v',c);}).join('')+'</div>';
  if(aco.length) html+='<div class="asec-t">⚪ Opzionali ('+aco.length+')</div><div class="ag">'+aco.map(function(a){return accCard(a,'o',c);}).join('')+'</div>';
  if(!acv.length&&!aco.length) html+='<div style="background:#F0FBF0;border-radius:10px;padding:40px 20px;text-align:center;margin-top:10px"><div style="font-size:38px;margin-bottom:8px">✅</div><div style="font-size:15px;font-weight:700;color:var(--green)">Staffa integrata</div><div style="font-size:12px;color:var(--dg);margin-top:4px">Nessun accessorio esterno necessario</div></div>';

  m.innerHTML=html;
  document.getElementById('vbk').onclick=function(){S.cur.group=null;render();};
}

function accCard(a,t,c){
  var stripe=t==='v'?c:'#F5A623';
  var badge=t==='v'?'<span class="ac-badge" style="background:#E8F5E9;color:#2E7D32">✓ Compat.</span>':'<span class="ac-badge" style="background:#FFF8E1;color:#E65100">⚪ Opz.</span>';
  return '<div class="ac '+(t==='v'?'cv':'co')+'">'+
    '<div class="ac-bar" style="background:'+stripe+'"></div>'+
    '<div class="ac-photo">'+(a.photo?'<img src="'+a.photo+'">':"<span style='font-size:20px'>🔩</span>")+'</div>'+
    '<div class="ac-body"><div class="ac-code">'+a.code+'</div><div class="ac-name">'+a.name+'</div>'+badge+'</div></div>';
}

// ── ACC PAGE ──────────────────────────────────────────────────────────
function renderAcc(m) {
  var q=(window._vaq||'').toLowerCase();
  var cats=[...new Set(S.accessories.map(function(a){return a.category||'Altro';}))].sort();
  var fl=S.accessories.filter(function(a){return !q||a.code.toLowerCase().includes(q)||a.name.toLowerCase().includes(q)||(a.category||'').toLowerCase().includes(q);});

  m.innerHTML='<div class="ph"><div><div class="ph-t">Accessori di Installazione</div>'+
    '<div class="ph-s">'+S.accessories.length+' accessori</div></div>'+
    '<div class="ph-r"><div class="srch"><input id="va-srch" placeholder="Cerca accessorio..." value="'+(window._vaq||'')+'"></div></div></div>'+
    '<div id="vacc-cats"></div>';

  document.getElementById('va-srch').oninput=function(){window._vaq=this.value;renderAcc(m);};

  var el=document.getElementById('vacc-cats');
  cats.forEach(function(cat){
    var items=fl.filter(function(a){return(a.category||'Altro')===cat;});
    if(!items.length)return;
    var sec=document.createElement('div');
    sec.innerHTML='<div style="font-size:12px;font-weight:700;color:var(--navy);margin:18px 0 10px;display:flex;align-items:center;gap:8px">'+cat+' ('+items.length+')<span style="flex:1;height:1px;background:var(--mg);display:block"></span></div>'+
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:13px;margin-bottom:16px" class="afg-'+cat.replace(/\s/g,'_')+'"></div>';
    el.appendChild(sec);
    var grid=sec.querySelector('div:last-child');
    items.forEach(function(a){
      var card=document.createElement('div');
      card.style.cssText='background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 5px #0001;text-align:center';
      card.innerHTML='<div style="height:100px;background:#fff;display:flex;align-items:center;justify-content:center;padding:8px;overflow:hidden">'+
        (a.photo?'<img src="'+a.photo+'" style="max-width:100%;max-height:84px;object-fit:contain">':"<span style='font-size:30px;color:var(--dg)'>🔩</span>")+
        '</div>'+
        '<div style="padding:10px;border-top:1px solid var(--lg)">'+
        '<div style="font-size:11px;font-weight:700;color:var(--orange);margin-bottom:3px">'+a.code+'</div>'+
        '<div style="font-size:10px;color:var(--dg);line-height:1.4">'+a.name+'</div>'+
        (a.notes?'<div style="font-size:9px;color:var(--dg);margin-top:4px;font-style:italic">'+a.notes+'</div>':'')+
        '</div>';
      grid.appendChild(card);
    });
  });
  if(!fl.length) el.innerHTML='<div class="empty"><div style="font-size:38px;opacity:.3">🔩</div><p style="font-size:15px;font-weight:700;margin:8px 0">Nessun accessorio</p></div>';
}

// ── START ─────────────────────────────────────────────────────────────
document.getElementById('nav-home').onclick=function(){S.cur.section='home';S.cur.group=null;render();};
document.getElementById('nav-acc').onclick=function(){S.cur.section='acc';S.cur.group=null;render();};
loadData();
</script>
</body>
</html>
